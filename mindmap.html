# Shiller《金融市場》

## 一、金融的目的
- 文明的支柱（L1）
  - 配置資源：時空與規模
  - 激勵與責任：「贊助有建設性的事」
  - 風險管理
- 在金融資本主義中找尋使命（L23）
  - 金融的道德性
  - 金融的民主化
  - 對「對的職涯」的建議

## 二、風險的科學
- 機率論與統計（L2）
  - 期望值、變異數、共變異數
  - 獨立性與其失效
  - 肥尾分配
  - 中央極限定理（L3）
- 投組理論（L4）
  - Markowitz 起源
  - 有效投組前沿
  - 切線投組與共同基金定理
  - CAPM
- 有效市場（L7）
  - 隨機漫步
  - Sharpe ratio 與其操弄
  - 技術分析批判（頭肩頂）

## 三、行為財務
- 心理學基礎（L11）
  - 人格心理學
  - 展望理論（Kahneman & Tversky）
  - 後悔理論
  - 過度自信
  - 認知失調 / 錨定 / 代表性
  - 社會傳染
- 道德判斷與商業世界（L11, L23）

## 四、金融制度
### 保險
- 保險原理：Risk Pooling（L5）
  - 壽險／健保／巨災險
- AIG 故事（L5, L14）
- 嘉賓 Hank Greenberg（L14）

### 銀行
- 銀行業基本原則（L13）
  - 流動性
  - 逆選擇與道德風險
- 擠兌、存款保險（L13）
- 監管：Basel I/II/III（L13, L18）
- 投資銀行（L19）
  - 影子銀行與 Repo
  - Glass-Steagall 興廢
  - 嘉賓 Jon Fougner
- 中央銀行（L18）
  - Bank of England 起源
  - Federal Reserve
  - Fed funds rate / 準備金

### 股票與公司
- 公司結構與融資（L9）
  - 普通股 / 優先股
  - ESOP / 回購
- 投資銀行與承銷（L19）

### 不動產
- 房貸史與證券化（L10）
- REITs
- MBS / CMO / CDO
- 2007–2008 危機

### 衍生商品
- 遠期與期貨（L15）
  - 標準化與保證金
  - Contango / Backwardation
  - 公平價值公式
- 選擇權（L17）
  - 買賣權平價
  - Black-Scholes
  - 二項式模型
  - 隱含波動率與 VIX
- 交換（Swap，L3）

### 公共與非營利
- 公部門（L16, L22）
  - 市政債與免稅
  - 社會保險（OASDI / 德國史）
  - 社會企業
- 嘉賓 Laura Cha（L16）

## 五、市場機構與業務
- 交易所、經紀商、自營商（L21）
  - 市價／限價／停損單
  - 電子交易與高頻
  - 清算機構
- 專業資金管理者（L20）
  - 共同基金 / Mutual Funds
  - 退休金 / DC plans
  - 信託
  - 家族辦公室
  - 捐贈基金 / Yale Model（L6）
- 嘉賓 David Swensen（L6）

## 六、監管與危機
- 失序、危機、自律（L12）
- 危機原因與槓桿循環（L8, L12）
- 監管層級
  - 公司董事會
  - 同業團體（SRO）
  - 地方（Progressive Era）
  - 國家（SEC）
  - 國際（Basel, G20）
- 避險基金的「極小監管」（L12）
